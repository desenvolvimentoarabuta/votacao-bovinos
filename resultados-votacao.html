<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resultados — Expo Arabutã 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      background: #f5f0e8;
      color: #2d2d2d;
      min-height: 100vh;
      padding: 32px 16px;
    }
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 28px;
      color: #2d5a27;
      font-weight: 900;
      letter-spacing: 1px;
    }
    header p {
      color: #8b4513;
      font-size: 13px;
      margin-top: 6px;
      letter-spacing: 1px;
    }
    .divider {
      width: 120px;
      height: 2px;
      background: #8b4513;
      opacity: 0.35;
      margin: 12px auto 0;
    }

    /* Cards de totais */
    .cards {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      min-width: 160px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border-top: 4px solid #2d5a27;
    }
    .card.zebu { border-top-color: #8b4513; }
    .card.total { border-top-color: #c8bfa8; }
    .card .num {
      font-size: 48px;
      font-weight: 900;
      color: #2d5a27;
      line-height: 1;
    }
    .card.zebu .num { color: #8b4513; }
    .card.total .num { color: #666; }
    .card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-top: 6px;
    }

    /* Vencedor */
    .winner-box {
      text-align: center;
      margin-bottom: 32px;
    }
    .winner-badge {
      display: inline-block;
      background: #2d5a27;
      color: #f5f0e8;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 10px 28px;
      border-radius: 30px;
    }
    .winner-badge.zebu { background: #8b4513; }
    .winner-badge.empate { background: #666; }

    /* Barras de progresso */
    .bars {
      max-width: 560px;
      margin: 0 auto 36px;
      background: white;
      border-radius: 12px;
      padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .bar-row { margin-bottom: 18px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 700;
      color: #444;
    }
    .bar-track {
      background: #eee;
      border-radius: 99px;
      height: 16px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: #2d5a27;
      transition: width 0.8s ease;
    }
    .bar-fill.zebu { background: #8b4513; }

    /* Tabela */
    .table-wrap {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
    }
    .table-header h2 {
      font-size: 14px;
      color: #2d5a27;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .export-btn {
      background: #2d5a27;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      font-family: Georgia, serif;
    }
    .export-btn:hover { background: #1e3d1a; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: #f9f7f3;
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      border-bottom: 1px solid #eee;
    }
    tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid #f0ede8;
      color: #444;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #faf8f4; }
    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .tag.eu { background: #e8f0e8; color: #2d5a27; }
    .tag.ze { background: #f5ece4; color: #8b4513; }

    /* Loading / erro */
    .status {
      text-align: center;
      padding: 48px;
      color: #888;
      font-size: 14px;
    }
    .refresh-btn {
      display: block;
      margin: 24px auto 0;
      background: none;
      border: 1px solid #2d5a27;
      color: #2d5a27;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: Georgia, serif;
      letter-spacing: 0.5px;
    }
    .refresh-btn:hover { background: #2d5a27; color: white; }
  </style>
</head>
<body>

<header>
  <h1>Escolha seu Campeão</h1>
  <p>EXPO ARABUTÃ 2026 — RESULTADOS DA VOTAÇÃO</p>
  <div class="divider"></div>
</header>

<div id="app"><div class="status">Carregando resultados...</div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDAwzxx_0nI9CpyanDojLctx-axDvM9Rwk",
    authDomain: "votacao-bovinos.firebaseapp.com",
    projectId: "votacao-bovinos",
    storageBucket: "votacao-bovinos.firebasestorage.app",
    messagingSenderId: "842066142656",
    appId: "1:842066142656:web:bf47889eb23ec2f0341425"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  async function carregar() {
    const snap = await getDocs(collection(db, "votos"));
    const votos = [];
    snap.forEach(doc => votos.push({ id: doc.id, ...doc.data() }));
    renderizar(votos);
  }

  function renderizar(votos) {
    const totalEu = votos.filter(v => v.europeu === "1" || v.europeu === 1).length;
    const totalZe = votos.filter(v => v.zebuino === "1" || v.zebuino === 1).length;
    const total   = votos.length;
    const pctEu   = total > 0 ? Math.round((totalEu / total) * 100) : 0;
    const pctZe   = total > 0 ? Math.round((totalZe / total) * 100) : 0;

    let vencedor = '';
    let badgeClass = '';
    if (totalEu > totalZe)      { vencedor = '🏆 Europeu na frente';  badgeClass = ''; }
    else if (totalZe > totalEu) { vencedor = '🏆 Zebuíno na frente';  badgeClass = 'zebu'; }
    else if (total === 0)        { vencedor = 'Nenhum voto ainda';      badgeClass = 'empate'; }
    else                         { vencedor = 'Empate técnico';          badgeClass = 'empate'; }

    // ordenar por timestamp desc
    const sorted = [...votos].sort((a, b) => {
      const ta = a.timestamp?.seconds ?? 0;
      const tb = b.timestamp?.seconds ?? 0;
      return tb - ta;
    });

    const rows = sorted.map(v => {
      const ts = v.timestamp?.seconds
        ? new Date(v.timestamp.seconds * 1000).toLocaleString('pt-BR')
        : '—';
      const eu = (v.europeu === "1" || v.europeu === 1)
        ? `<span class="tag eu">✓ Europeu</span>` : `<span style="color:#ccc">—</span>`;
      const ze = (v.zebuino === "1" || v.zebuino === 1)
        ? `<span class="tag ze">✓ Zebuíno</span>` : `<span style="color:#ccc">—</span>`;
      const cpfMask = v.cpf ? v.cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4') : v.id;
      return `<tr><td>${cpfMask}</td><td>${eu}</td><td>${ze}</td><td>${ts}</td></tr>`;
    }).join('');

    document.getElementById('app').innerHTML = `
      <div class="cards">
        <div class="card">
          <div class="num">${totalEu}</div>
          <div class="label">Europeu</div>
        </div>
        <div class="card zebu">
          <div class="num">${totalZe}</div>
          <div class="label">Zebuíno</div>
        </div>
        <div class="card total">
          <div class="num">${total}</div>
          <div class="label">Total de votos</div>
        </div>
      </div>

      <div class="winner-box">
        <span class="winner-badge ${badgeClass}">${vencedor}</span>
      </div>

      <div class="bars">
        <div class="bar-row">
          <div class="bar-label"><span>Europeu</span><span>${pctEu}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pctEu}%"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label"><span>Zebuíno</span><span>${pctZe}%</span></div>
          <div class="bar-track"><div class="bar-fill zebu" style="width:${pctZe}%"></div></div>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-header">
          <h2>Todos os votos (${total})</h2>
          <button class="export-btn" onclick="exportarCSV()">⬇ Exportar CSV</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>CPF</th>
              <th>Europeu</th>
              <th>Zebuíno</th>
              <th>Data / Hora</th>
            </tr>
          </thead>
          <tbody>${rows || '<tr><td colspan="4" style="text-align:center;color:#aaa;padding:24px">Nenhum voto registrado</td></tr>'}</tbody>
        </table>
      </div>

      <button class="refresh-btn" onclick="location.reload()">↻ Atualizar resultados</button>
    `;

    // guarda para exportar
    window._votos = sorted;
  }

  window.exportarCSV = function() {
    const votos = window._votos || [];
    const header = 'CPF,Europeu,Zebuino,Data\n';
    const linhas = votos.map(v => {
      const ts = v.timestamp?.seconds
        ? new Date(v.timestamp.seconds * 1000).toLocaleString('pt-BR')
        : '';
      const eu = (v.europeu === "1" || v.europeu === 1) ? 'Sim' : 'Nao';
      const ze = (v.zebuino === "1" || v.zebuino === 1) ? 'Sim' : 'Nao';
      return `${v.cpf || v.id},${eu},${ze},"${ts}"`;
    }).join('\n');
    const blob = new Blob([header + linhas], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'votos_expo_arabuta_2026.csv';
    a.click();
  };

  carregar().catch(err => {
    document.getElementById('app').innerHTML =
      `<div class="status">Erro ao carregar dados.<br><small>${err.message}</small></div>`;
  });
</script>
</body>
</html>
