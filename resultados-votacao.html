<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resultados — Expo Arabutã 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #2d5a27; --verde-claro: #4a8c3f;
      --terra: #8b4513; --terra-claro: #c4692a;
      --creme: #f5f0e8; --creme-escuro: #e8dfc8;
      --texto: #1a1a1a; --branco: #ffffff;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--creme);
      min-height: 100vh;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(45,90,39,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(139,69,19,0.07) 0%, transparent 50%);
    }
    .container { max-width: 780px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 2.5rem; }
    .badge {
      display: inline-block; background: var(--verde); color: var(--branco);
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 0.35rem 1rem; border-radius: 2rem; margin-bottom: 1rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900;
      color: var(--verde); line-height: 1.1; margin-bottom: 0.5rem;
    }
    header p { color: #666; font-size: 0.95rem; }

    .totais { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
    .total-card {
      background: var(--branco); border-radius: 14px; padding: 1.4rem 2rem;
      text-align: center; min-width: 150px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); border-top: 4px solid var(--verde);
    }
    .total-card.zebu { border-top-color: var(--terra); }
    .total-card.cinza { border-top-color: #bbb; }
    .total-card .num {
      font-family: 'Playfair Display', serif; font-size: 2.8rem;
      font-weight: 900; color: var(--verde); line-height: 1;
    }
    .total-card.zebu .num { color: var(--terra); }
    .total-card.cinza .num { color: #777; font-size: 1.1rem; padding-top: 0.6rem; }
    .total-card .lbl { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.2px; color: #999; margin-top: 4px; }

    .secao {
      background: var(--branco); border-radius: 16px; padding: 1.8rem;
      margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .secao-titulo {
      font-family: 'Playfair Display', serif; font-size: 1.15rem;
      font-weight: 700; color: var(--verde); margin-bottom: 1.2rem;
    }
    .secao-titulo.zebu { color: var(--terra); }

    .baia-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.75rem; }
    .baia-row:last-child { margin-bottom: 0; }
    .baia-pos { font-size: 0.72rem; font-weight: 700; color: #ccc; width: 22px; text-align: center; flex-shrink: 0; }
    .baia-pos.gold { color: #c8a000; }
    .baia-pos.silver { color: #888; }
    .baia-pos.bronze { color: #a0522d; }
    .baia-nome { font-size: 0.85rem; font-weight: 600; color: #555; width: 68px; flex-shrink: 0; }
    .baia-track { flex: 1; background: #f0ede8; border-radius: 99px; height: 14px; overflow: hidden; }
    .baia-fill { height: 100%; border-radius: 99px; background: var(--verde); transition: width 0.8s ease; min-width: 2px; }
    .baia-fill.zebu { background: var(--terra); }
    .baia-votos { font-size: 0.8rem; font-weight: 700; color: #666; width: 52px; text-align: right; flex-shrink: 0; }

    .secao-tabela {
      background: var(--branco); border-radius: 16px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 1.5rem;
    }
    .tabela-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 1.5rem; border-bottom: 1px solid #f0ede8;
    }
    .tabela-header h2 { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--verde); }
    .btn-csv {
      background: var(--verde); color: var(--branco); border: none;
      padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.8rem;
      font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-csv:hover { background: var(--verde-claro); }

    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th {
      background: #faf8f4; padding: 0.7rem 1.2rem; text-align: left;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px;
      color: #999; border-bottom: 1px solid #f0ede8;
    }
    tbody td { padding: 0.75rem 1.2rem; border-bottom: 1px solid #f8f5f0; color: #444; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #faf8f4; }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; }
    .tag.eu { background: #e8f0e8; color: var(--verde); }
    .tag.ze { background: #f5ece4; color: var(--terra); }

    .btn-refresh {
      display: block; margin: 0 auto 2rem; background: none;
      border: 1.5px solid var(--verde); color: var(--verde);
      padding: 0.6rem 1.4rem; border-radius: 8px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-refresh:hover { background: var(--verde); color: var(--branco); }
    .loading { text-align: center; padding: 4rem; color: #aaa; font-size: 0.95rem; }
    footer { text-align: center; font-size: 0.78rem; color: #bbb; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">📊 Painel de Resultados</div>
    <h1>Escolha seu Campeão</h1>
    <p>Expo Arabutã 2026 — resultados em tempo real</p>
  </header>

  <div id="app"><div class="loading">Carregando resultados...</div></div>

  <footer>Sistema de votação · Expo Arabutã 2026</footer>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDAwzxx_0nI9CpyanDojLctx-axDvM9Rwk",
    authDomain:        "votacao-bovinos.firebaseapp.com",
    projectId:         "votacao-bovinos",
    storageBucket:     "votacao-bovinos.firebasestorage.app",
    messagingSenderId: "842066142656",
    appId:             "1:842066142656:web:bf47889eb23ec2f0341425"
  };

  const boisEuropeus = [
    "Baia 1","Baia 2","Baia 3","Baia 4","Baia 5","Baia 6","Baia 7",
    "Baia 8","Baia 9","Baia 10","Baia 11","Baia 12","Baia 13","Baia 14"
  ];
  const boisZebuinos = ["Baia 1","Baia 2","Baia 3","Baia 4","Baia 5","Baia 6"];

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  async function carregar() {
    const snap = await getDocs(collection(db, "votos"));
    const votos = [];
    snap.forEach(d => votos.push({ id: d.id, ...d.data() }));
    renderizar(votos);
  }

  function contarPorBaia(votos, campo, nomes) {
    const contagem = new Array(nomes.length).fill(0);
    votos.forEach(v => {
      const idx = parseInt(v[campo]) - 1;
      if (idx >= 0 && idx < nomes.length) contagem[idx]++;
    });
    return nomes
      .map((nome, i) => ({ nome, votos: contagem[i], indice: i + 1 }))
      .sort((a, b) => b.votos - a.votos);
  }

  function medalha(i) {
    return ['gold','silver','bronze'][i] ?? '';
  }

  function renderRanking(lista, tipo) {
    const max = Math.max(...lista.map(x => x.votos), 1);
    return lista.map((item, i) => `
      <div class="baia-row">
        <div class="baia-pos ${medalha(i)}">${i+1}º</div>
        <div class="baia-nome">${item.nome}</div>
        <div class="baia-track">
          <div class="baia-fill ${tipo}" style="width:${(item.votos/max*100).toFixed(1)}%"></div>
        </div>
        <div class="baia-votos">${item.votos} voto${item.votos!==1?'s':''}</div>
      </div>`).join('');
  }

  function renderizar(votos) {
    const total  = votos.length;
    const rankEu = contarPorBaia(votos, 'europeu', boisEuropeus);
    const rankZe = contarPorBaia(votos, 'zebuino', boisZebuinos);

    const sorted = [...votos].sort((a,b) => (b.timestamp?.seconds??0)-(a.timestamp?.seconds??0));

    const rows = sorted.map(v => {
      const ts = v.timestamp?.seconds
        ? new Date(v.timestamp.seconds*1000).toLocaleString('pt-BR') : '—';
      const eu = boisEuropeus[parseInt(v.europeu)-1] ?? `Baia ${v.europeu}`;
      const ze = boisZebuinos[parseInt(v.zebuino)-1] ?? `Baia ${v.zebuino}`;
      const cpf = (v.cpf??v.id).replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
      return `<tr>
        <td>${cpf}</td>
        <td><span class="tag eu">${eu}</span></td>
        <td><span class="tag ze">${ze}</span></td>
        <td>${ts}</td>
      </tr>`;
    }).join('');

    document.getElementById('app').innerHTML = `
      <div class="totais">
        <div class="total-card cinza">
          <div class="num" style="font-size:2.8rem">${total}</div>
          <div class="lbl">Total de votos</div>
        </div>
        <div class="total-card">
          <div class="num" style="font-size:${rankEu[0]?.votos>0?'1rem':'2rem'};padding-top:${rankEu[0]?.votos>0?'0.6rem':'0'}">
            ${rankEu[0]?.votos>0 ? rankEu[0].nome : '—'}
          </div>
          <div class="lbl">🌿 Líder Europeu</div>
        </div>
        <div class="total-card zebu">
          <div class="num" style="font-size:${rankZe[0]?.votos>0?'1rem':'2rem'};padding-top:${rankZe[0]?.votos>0?'0.6rem':'0'}">
            ${rankZe[0]?.votos>0 ? rankZe[0].nome : '—'}
          </div>
          <div class="lbl">☀️ Líder Zebuíno</div>
        </div>
      </div>

      <div class="secao">
        <div class="secao-titulo">🌿 Raças Europeias — ranking por baia</div>
        ${renderRanking(rankEu, '')}
      </div>

      <div class="secao">
        <div class="secao-titulo zebu">☀️ Raças Zebuínas — ranking por baia</div>
        ${renderRanking(rankZe, 'zebu')}
      </div>

      <div class="secao-tabela">
        <div class="tabela-header">
          <h2>Todos os votos (${total})</h2>
          <button class="btn-csv" onclick="exportarCSV()">⬇ Exportar CSV</button>
        </div>
        <table>
          <thead><tr><th>CPF</th><th>Europeu</th><th>Zebuíno</th><th>Data / Hora</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="4" style="text-align:center;color:#bbb;padding:2rem">Nenhum voto ainda</td></tr>'}</tbody>
        </table>
      </div>

      <button class="btn-refresh" onclick="location.reload()">↻ Atualizar resultados</button>
    `;

    window._votos = sorted;
  }

  window.exportarCSV = function() {
    const votos = window._votos || [];
    const linhas = votos.map(v => {
      const ts = v.timestamp?.seconds ? new Date(v.timestamp.seconds*1000).toLocaleString('pt-BR') : '';
      const eu = boisEuropeus[parseInt(v.europeu)-1] ?? `Baia ${v.europeu}`;
      const ze = boisZebuinos[parseInt(v.zebuino)-1] ?? `Baia ${v.zebuino}`;
      return `${v.cpf??v.id},"${eu}","${ze}","${ts}"`;
    });
    const blob = new Blob(['CPF,Europeu,Zebuino,Data\n'+linhas.join('\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'votos_expo_arabuta_2026.csv'; a.click();
  };

  carregar().catch(err => {
    document.getElementById('app').innerHTML = `<div class="loading">Erro: ${err.message}</div>`;
  });
</script>
</body>
</html>
